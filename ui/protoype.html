<button id="connect">Connect OBD</button>
<pre id="log"></pre>

<script>
const log = (msg) => {
  document.getElementById("log").textContent += msg + "\n";
};

let port, reader, writer;

const delay = (ms) => new Promise(res => setTimeout(res, ms));

document.getElementById("connect").onclick = async () => {
  try {

    // Request serial port
    port = await navigator.serial.requestPort();
    await port.open({ baudRate: 9600 });

    reader = port.readable.getReader();
    writer = port.writable.getWriter();

    log("✅ Connected to ELM327");

    // =====================
    // ELM327 INITIALIZATION
    // =====================

    await send("ATZ");     // reset
    await delay(1500);

    await send("ATE0");    // echo off
    await send("ATL0");    // linefeeds off
    await send("ATS1");    // spaces on
    await send("ATH1");    // show headers (helps debugging)

    await send("ATSP6");   // FORCE CAN 11bit 500k (most modern cars)
    await send("ATDP");    // display protocol

    await delay(1500);     // give ECU time to wake

    log("🔄 Checking ECU support...");

    // =====================
    // ECU WAKE TEST
    // =====================

    const supported = await send("0100");
    log("Supported PID response: " + supported);

    // =====================
    // MODE 01 TEST
    // =====================

    log("📡 Testing Mode 01 PID 01...");

    const response = await send("0101");
    log("Response: " + response);

    if (response.includes("41 01")) {
      log("✅ Mode 01 communication confirmed!");
    } else {
      log("⚠️ Mode 01 not confirmed.");
    }

  } catch (err) {
    log("❌ Error: " + err.message);
  }
};


// =====================
// SEND COMMAND
// =====================

async function send(cmd) {

  const encoder = new TextEncoder();
  const decoder = new TextDecoder();

  log(">> " + cmd);

  await writer.write(encoder.encode(cmd + "\r"));

  let buffer = "";

  while (true) {

    const { value, done } = await reader.read();

    if (done) break;

    const chunk = decoder.decode(value);
    buffer += chunk;

    log("<< " + chunk);

    if (buffer.includes(">")) break; // ELM prompt
  }

  return buffer.replace(/>/g, "").trim();
}

</script>
